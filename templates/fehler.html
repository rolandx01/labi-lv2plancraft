<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fehler beim Konvertieren</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 640px;
            width: 100%;
            padding: 40px;
        }
        .error-icon { font-size: 64px; text-align: center; margin-bottom: 16px; }
        h1 { color: #c0392b; font-size: 24px; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #666; text-align: center; margin-bottom: 24px; font-size: 14px; }
        .fehler-box {
            background: #fdecea;
            border-left: 4px solid #c0392b;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 12px;
            color: #c0392b;
            font-size: 14px;
        }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #f39c12;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 12px;
            color: #856404;
            font-size: 14px;
        }
        .header-preview {
            margin-top: 24px;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            color: #666;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .header-preview-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        a.button {
            display: block;
            background: #c0392b;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">⚠</div>
        <h1>Konvertierung fehlgeschlagen</h1>
        <p class="subtitle">Das PDF konnte nicht gelesen werden.</p>

        {% for f in fehler %}
            <div class="fehler-box"><strong>✗ {{ f }}</strong></div>
        {% endfor %}

        {% for w in warnungen %}
            <div class="warning-box">⚠ {{ w }}</div>
        {% endfor %}

        {% if header_text %}
        <div class="header-preview-label">Erkannter Header-Auszug:</div>
        <div class="header-preview">{{ header_text }}</div>
        {% endif %}

        <a href="/" class="button">↺ Anderes PDF versuchen</a>
    </div>
</body>
</html>
