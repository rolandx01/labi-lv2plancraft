# Render.com Deployment-Konfiguration
# Wird automatisch erkannt, wenn render.yaml im Repo-Root liegt.

services:
  - type: web
    name: labi-lv2plancraft
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
